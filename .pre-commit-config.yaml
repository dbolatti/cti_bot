repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '^(venv/|\.venv/|cti\.db$|\.env$)'

  - repo: local
    hooks:
      - id: block-sensitive-files
        name: Bloquear archivos sensibles (.env, cti.db)
        entry: python scripts/check_sensitive_files.py
        language: system
        pass_filenames: false
        always_run: true
